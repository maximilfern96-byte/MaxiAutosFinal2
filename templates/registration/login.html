{% extends "base.html" %}

{% block contenido %}

<style>

.login-box{
max-width:400px;
margin:60px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 14px rgba(0,0,0,0.1);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

.login-box button{
padding:10px 20px;
background:#0d1b2a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

<div class="login-box">

<h2>Iniciar sesión</h2>

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">
Ingresar
</button>

</form>

</div>

{% endblock %}
